name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Validate backend
      shell: bash
      run: |
        set -euxo pipefail
        command -v python
        python --version
        python -m pip install --upgrade pip
        python -m pip install -r backend/requirements.txt
        python -m compileall backend

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"
        cache-dependency-path: frontend/package-lock.json

    - name: Upgrade npm
      shell: bash
      run: |
        set -euxo pipefail
        npm --version
        npm i -g npm@10.9.2
        npm --version

    - name: Validate frontend
      shell: bash
      working-directory: frontend
      env:
        NODE_ENV: development
        NPM_CONFIG_OMIT: ""
      run: |
        set -euxo pipefail
        command -v node
        node --version
        command -v npm
        npm --version
        npm config get production || true
        npm config get omit || true
        unset npm_config_omit NPM_CONFIG_OMIT
        npm cache verify || true
        npm ci --no-audit --no-fund || (
          echo "npm ci failed"
          ls -la
          if [[ -d /home/runner/.npm/_logs ]]; then
            latest_log="$(ls -t /home/runner/.npm/_logs/*debug-0.log 2>/dev/null | head -n 1 || true)"
            if [[ -n "$latest_log" ]]; then
              echo "Latest npm debug log: $latest_log"
              tail -n 200 "$latest_log" || true
            fi
          fi
          npm cache clean --force || true
          npm install --no-audit --no-fund
        )
        test -x ./node_modules/.bin/eslint
        ./node_modules/.bin/eslint --version
        npm run lint
        npm run build

    - name: Upload npm logs (on failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: npm-logs
        path: /home/runner/.npm/_logs/*.log

    - name: Configure SSH
      shell: bash
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        SSH_HOST: 122.51.223.247
        SSH_USER: root
      run: |
        set -euo pipefail
        mkdir -p ~/.ssh
        printf '%b' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa

        first_line="$(head -n 1 ~/.ssh/id_rsa || true)"
        if [[ "$first_line" == PuTTY-User-Key-File* ]]; then
          echo "SSH_PRIVATE_KEY 看起来是 PuTTY .ppk 格式，请转换为 OpenSSH 私钥后再放到 GitHub Secrets。"
          exit 1
        fi

        eval "$(ssh-agent -s)"
        ssh-add ~/.ssh/id_rsa
        ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

    - name: Deploy to server
      shell: bash
      env:
        SSH_HOST: 122.51.223.247
        SSH_USER: root
      run: |
        set -euxo pipefail
        ssh -o BatchMode=yes -o StrictHostKeyChecking=yes "${SSH_USER}@${SSH_HOST}" '
          set -euxo pipefail
          cd /root/jwt-auth-project
          if ! command -v bash >/dev/null 2>&1; then echo "bash not found" ; exit 127 ; fi
          if ! command -v python3 >/dev/null 2>&1 && ! command -v python >/dev/null 2>&1; then echo "python not found" ; exit 127 ; fi
          if ! command -v npm >/dev/null 2>&1; then echo "npm not found" ; exit 127 ; fi
          ./deploy.sh
        '
